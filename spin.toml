spin_manifest_version = 2

[application]
name = "spin-cpp-example"
version = "0.0.1"

[[trigger.http]]
route = "/..."
component = "example"

[component.example]
source = "example.wasm"
allowed_outbound_hosts = ["http://*", "https://*"]
build.command = "wasm32-wasip2-clang++ -fno-exceptions -std=c++23 example.cpp bindings/http_trigger.cpp bindings/http_trigger_component_type.o -o example.wasm"
